name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI ⚡
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 🏗️ Setup CI environment
        uses: ./.github/actions/setup-ci

      - name: 🔒 Typecheck
        run: pnpm typecheck

      - name: 🧪 Running Unit Tests
        run: pnpm test

      - name: 🔬 Lint
        run: pnpm lint

      - name: 📝 Format
        run: pnpm format:check

  test-setup:
    name: E2E Test setup ⚗️
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ github.event_name == 'pull_request' && steps.waitForVercelPreviewDeployment.outputs.url || steps.waitForVercelProductionDeployment.outputs.url }}
    steps:
      - name: Wait for Vercel Preview
        if: github.event_name == 'pull_request'
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: waitForVercelPreviewDeployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          vercel_protection_bypass_header: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          max_timeout: 800

      - name: Wait for Vercel Production
        if: github.event_name == 'push'
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: waitForVercelProductionDeployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          vercel_protection_bypass_header: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          max_timeout: 800

      - name: Log resolved deployment URL
        run: echo ${{ github.event_name == 'pull_request' && steps.waitForVercelPreviewDeployment.outputs.url || 'https://www.ddfdb.de' }}

  e2e-test:
    needs: test-setup
    name: E2E Test 🧪
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 🏗️ Setup CI environment
        uses: ./.github/actions/setup-ci

      - name: 🎭 Get installed Playwright version
        id: playwright-version
        run: |
          echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package.json').devDependencies['@playwright/test'])")" >> $GITHUB_ENV
          echo ${{ env.PLAYWRIGHT_VERSION }}

      - name: 🗂️ Cache playwright binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: 💻 Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.test-setup.outputs.deployment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
